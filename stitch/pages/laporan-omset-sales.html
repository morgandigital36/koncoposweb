<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('laporan')"></i>
  <span class="topbar-title">Omset Sales</span>
  <i class="fa-solid fa-download topbar-icon" onclick="exportLaporanOmsetSales()"></i>
</div>
<div class="screen-content">
  <div class="laporan-filter-bar">
    <div class="laporan-date-range">
      <div class="form-group">
        <label>Dari</label>
        <input type="date" id="omset-dari" class="form-input" onchange="renderLaporanOmsetSales()" />
      </div>
      <div class="form-group">
        <label>Sampai</label>
        <input type="date" id="omset-sampai" class="form-input" onchange="renderLaporanOmsetSales()" />
      </div>
    </div>
    <div class="laporan-export-btns">
      <button class="btn-export" onclick="exportOmsetPDF()">
        <i class="fa-solid fa-file-pdf"></i> PDF
      </button>
      <button class="btn-export" onclick="exportOmsetExcel()">
        <i class="fa-solid fa-file-excel"></i> Excel
      </button>
    </div>
  </div>
  <div id="laporan-omset-body"></div>
</div>
