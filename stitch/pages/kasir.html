<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Kasir</span>
  <span id="kasir-count" style="font-size:12px;color:rgba(255,255,255,0.8);"></span>
</div>
<div class="crud-search-bar">
  <i class="fa-solid fa-magnifying-glass" style="color:var(--text-light);font-size:14px;flex-shrink:0;"></i>
  <input type="text" id="kasir-search" class="crud-search-input" placeholder="Cari kasir..." oninput="filterKontak('kasir')" />
</div>
<div class="screen-content" id="kasir-list"></div>
<button class="crud-fab" onclick="openFormKontak('kasir')">
  <i class="fa-solid fa-plus"></i>
</button>

<div id="modal-kontak-kasir" class="modal-overlay" style="display:none;" onclick="tutupFormKontak('kasir')">
  <div class="modal-sheet crud-form-sheet" onclick="event.stopPropagation()">
    <div class="crud-form-header">
      <span id="form-kasir-title">Tambah Kasir</span>
      <i class="fa-solid fa-xmark modal-close-icon" onclick="tutupFormKontak('kasir')"></i>
    </div>
    <div class="tp-form" style="margin-bottom:12px;">
      <div class="tp-field-group">
        <label class="tp-label">Nama Kasir *</label>
        <input type="text" id="form-kasir-nama" class="tp-input" placeholder="Nama kasir..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">No. Telepon</label>
        <input type="tel" id="form-kasir-telp" class="tp-input" placeholder="08xx..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Username Login</label>
        <input type="text" id="form-kasir-email" class="tp-input" placeholder="Username..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">PIN / Password</label>
        <input type="password" id="form-kasir-alamat" class="tp-input" placeholder="PIN 4-6 digit..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Akses</label>
        <div class="tp-select-wrap tp-select-full">
          <select id="form-kasir-ket" class="tp-select">
            <option value="kasir">Kasir (tanpa harga beli)</option>
            <option value="admin">Admin (akses penuh)</option>
          </select>
          <i class="fa-solid fa-chevron-down tp-select-arrow"></i>
        </div>
      </div>
    </div>
    <button class="btn-simpan" onclick="simpanFormKontak('kasir')">Simpan</button>
  </div>
</div>
