<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Jenis Penjualan</span>
  <span style="width:24px;"></span>
</div>
<div class="screen-content" id="jenis-penjualan-list"></div>
<button class="crud-fab" onclick="bukaFormJenisPenjualan()">
  <i class="fa-solid fa-plus"></i>
</button>

<div id="modal-jenis-penjualan-form" class="modal-overlay" style="display:none;" onclick="tutupFormJenisPenjualan()">
  <div class="modal-sheet crud-form-sheet" onclick="event.stopPropagation()">
    <div class="crud-form-header">
      <span id="form-jenis-title">Tambah Jenis Penjualan</span>
      <i class="fa-solid fa-xmark modal-close-icon" onclick="tutupFormJenisPenjualan()"></i>
    </div>
    <div class="tp-form" style="margin-bottom:12px;">
      <div class="tp-field-group">
        <label class="tp-label">Nama Jenis Penjualan *</label>
        <input type="text" id="form-jenis-nama" class="tp-input" placeholder="Contoh: Reguler, Grosir..." />
      </div>
    </div>
    <button class="btn-simpan" onclick="simpanJenisPenjualan()">Simpan</button>
  </div>
</div>
