<div class="topbar">
  <span class="topbar-title">Laporan</span>
</div>
<div class="screen-content">

  <div class="settings-group-label">Penjualan</div>
  <div class="list-menu">
    <div class="list-item" onclick="switchScreen('laporan-penjualan')">
      <div class="list-item-left"><i class="fa-solid fa-chart-line list-icon" style="color:#2ecc71;"></i><span>Laporan Penjualan</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-produk-terjual')">
      <div class="list-item-left"><i class="fa-solid fa-boxes-stacked list-icon" style="color:#3498db;"></i><span>Produk Terjual</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-piutang')">
      <div class="list-item-left"><i class="fa-solid fa-file-invoice-dollar list-icon" style="color:#e67e22;"></i><span>Piutang Pelanggan</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-invoice-pelanggan')">
      <div class="list-item-left"><i class="fa-solid fa-file-invoice list-icon" style="color:#16a085;"></i><span>Invoice Pelanggan</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-omset-sales')">
      <div class="list-item-left"><i class="fa-solid fa-user-tie list-icon" style="color:#8e44ad;"></i><span>Omset Sales</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

  <div class="settings-group-label">Pembelian</div>
  <div class="list-menu">
    <div class="list-item" onclick="switchScreen('laporan-pembelian')">
      <div class="list-item-left"><i class="fa-solid fa-cart-arrow-down list-icon" style="color:#9b59b6;"></i><span>Laporan Pembelian</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-hutang-supplier')">
      <div class="list-item-left"><i class="fa-solid fa-money-check-dollar list-icon" style="color:var(--danger);"></i><span>Hutang Supplier</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-invoice-supplier')">
      <div class="list-item-left"><i class="fa-solid fa-file-contract list-icon" style="color:#c0392b;"></i><span>Invoice Supplier</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

  <div class="settings-group-label">Stok & Produk</div>
  <div class="list-menu">
    <div class="list-item" onclick="switchScreen('laporan-persediaan')">
      <div class="list-item-left"><i class="fa-solid fa-warehouse list-icon" style="color:#1abc9c;"></i><span>Persediaan Stok</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-mutasi-stok')">
      <div class="list-item-left"><i class="fa-solid fa-arrow-right-arrow-left list-icon" style="color:#f39c12;"></i><span>Mutasi Stok</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

  <div class="settings-group-label">Keuangan</div>
  <div class="list-menu">
    <div class="list-item" onclick="switchScreen('laporan-laba-rugi')">
      <div class="list-item-left"><i class="fa-solid fa-scale-balanced list-icon" style="color:var(--primary);"></i><span>Laba Rugi</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-arus-kas')">
      <div class="list-item-left"><i class="fa-solid fa-water list-icon" style="color:#2980b9;"></i><span>Arus Kas</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-biaya')">
      <div class="list-item-left"><i class="fa-solid fa-receipt list-icon" style="color:#e74c3c;"></i><span>Biaya & Pendapatan Lain</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
    <div class="list-item" onclick="switchScreen('laporan-jatuh-tempo')">
      <div class="list-item-left"><i class="fa-solid fa-calendar-xmark list-icon" style="color:#d35400;"></i><span>Jatuh Tempo</span></div>
      <i class="fa-solid fa-chevron-right"></i>
    </div>
  </div>

  <div style="height:12px;"></div>
</div>
