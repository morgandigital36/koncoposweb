<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('laporan')"></i>
  <span class="topbar-title">Invoice Pelanggan</span>
  <i class="fa-solid fa-download topbar-icon" onclick="exportLaporanInvoicePelanggan()"></i>
</div>
<div class="screen-content">
  <div class="laporan-filter-bar">
    <div class="laporan-date-range">
      <div class="form-group">
        <label>Dari</label>
        <input type="date" id="inv-pel-dari" class="form-input" onchange="renderLaporanInvoicePelanggan()" />
      </div>
      <div class="form-group">
        <label>Sampai</label>
        <input type="date" id="inv-pel-sampai" class="form-input" onchange="renderLaporanInvoicePelanggan()" />
      </div>
    </div>
    <div class="form-group" style="flex:1;">
      <label>Cari Pelanggan</label>
      <input type="text" id="inv-pel-search" class="form-input" placeholder="Nama pelanggan..." oninput="renderLaporanInvoicePelanggan()" />
    </div>
    <div class="laporan-export-btns">
      <button class="btn-export" onclick="exportInvoicePelangganPDF()">
        <i class="fa-solid fa-file-pdf"></i> PDF
      </button>
      <button class="btn-export" onclick="exportInvoicePelangganExcel()">
        <i class="fa-solid fa-file-excel"></i> Excel
      </button>
    </div>
  </div>
  <div id="laporan-invoice-pelanggan-body"></div>
</div>
