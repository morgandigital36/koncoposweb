<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Outlet</span>
  <span style="width:24px;"></span>
</div>
<div class="screen-content">
  <div class="tp-form">
    <div class="tp-field-group"><label class="tp-label">Nama Outlet</label><input type="text" id="outlet-nama" class="tp-input" placeholder="Nama toko/outlet..." /></div>
    <div class="tp-field-group"><label class="tp-label">Alamat</label><textarea id="outlet-alamat" class="tp-textarea" rows="3" placeholder="Alamat outlet..."></textarea></div>
    <div class="tp-field-group"><label class="tp-label">No. Telepon</label><input type="tel" id="outlet-telp" class="tp-input" placeholder="08xx..." /></div>
    <div class="tp-field-group"><label class="tp-label">Email</label><input type="email" id="outlet-email" class="tp-input" placeholder="email@..." /></div>
    <div class="tp-field-group"><label class="tp-label">Catatan Struk</label><textarea id="outlet-catatan" class="tp-textarea" rows="2" placeholder="Pesan di bawah struk..."></textarea></div>
  </div>
  <div style="height:16px;"></div>
</div>
<div class="tp-footer"><button class="btn-simpan" onclick="simpanOutlet()">Simpan</button></div>
