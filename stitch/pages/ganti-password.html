<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Ganti Password</span>
  <span style="width:24px;"></span>
</div>
<div class="screen-content">
  <div class="tp-form">
    <div class="tp-field-group"><label class="tp-label">Password Lama</label><input type="password" id="pw-lama" class="tp-input" placeholder="Password lama..." /></div>
    <div class="tp-field-group"><label class="tp-label">Password Baru</label><input type="password" id="pw-baru" class="tp-input" placeholder="Password baru..." /></div>
    <div class="tp-field-group"><label class="tp-label">Konfirmasi Password Baru</label><input type="password" id="pw-konfirmasi" class="tp-input" placeholder="Ulangi password baru..." /></div>
  </div>
  <div style="height:16px;"></div>
</div>
<div class="tp-footer"><button class="btn-simpan" onclick="gantiPassword()">Simpan</button></div>
