<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Metode Pembayaran</span>
  <span style="width:24px;"></span>
</div>
<div class="screen-content" id="metode-pembayaran-list"></div>
<button class="crud-fab" onclick="bukaFormMetodePembayaran()">
  <i class="fa-solid fa-plus"></i>
</button>

<div id="modal-metode-form" class="modal-overlay" style="display:none;" onclick="tutupFormMetodePembayaran()">
  <div class="modal-sheet crud-form-sheet" onclick="event.stopPropagation()">
    <div class="crud-form-header">
      <span id="form-metode-title">Tambah Metode Pembayaran</span>
      <i class="fa-solid fa-xmark modal-close-icon" onclick="tutupFormMetodePembayaran()"></i>
    </div>
    <div class="tp-form" style="margin-bottom:12px;">
      <div class="tp-field-group">
        <label class="tp-label">Nama Metode *</label>
        <input type="text" id="form-metode-nama" class="tp-input" placeholder="Contoh: Tunai, Transfer, QRIS..." />
      </div>
    </div>
    <button class="btn-simpan" onclick="simpanMetodePembayaran()">Simpan</button>
  </div>
</div>
