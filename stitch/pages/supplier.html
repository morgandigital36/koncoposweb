<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Supplier</span>
  <span id="supplier-count" style="font-size:12px;color:rgba(255,255,255,0.8);"></span>
</div>
<div class="crud-search-bar">
  <i class="fa-solid fa-magnifying-glass" style="color:var(--text-light);font-size:14px;flex-shrink:0;"></i>
  <input type="text" id="supplier-search" class="crud-search-input" placeholder="Cari supplier..." oninput="filterKontak('supplier')" />
</div>
<div class="screen-content" id="supplier-list"></div>
<button class="crud-fab" onclick="openFormKontak('supplier')">
  <i class="fa-solid fa-plus"></i>
</button>

<!-- Form Modal -->
<div id="modal-kontak-supplier" class="modal-overlay" style="display:none;" onclick="tutupFormKontak('supplier')">
  <div class="modal-sheet crud-form-sheet" onclick="event.stopPropagation()">
    <div class="crud-form-header">
      <span id="form-supplier-title">Tambah Supplier</span>
      <i class="fa-solid fa-xmark modal-close-icon" onclick="tutupFormKontak('supplier')"></i>
    </div>
    <div class="tp-form" style="margin-bottom:12px;">
      <div class="tp-field-group">
        <label class="tp-label">Nama Supplier *</label>
        <input type="text" id="form-supplier-nama" class="tp-input" placeholder="Nama supplier..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">No. Telepon</label>
        <input type="tel" id="form-supplier-telp" class="tp-input" placeholder="08xx..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Email</label>
        <input type="email" id="form-supplier-email" class="tp-input" placeholder="email@..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Alamat</label>
        <textarea id="form-supplier-alamat" class="tp-textarea" rows="2" placeholder="Alamat..."></textarea>
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Keterangan</label>
        <input type="text" id="form-supplier-ket" class="tp-input" placeholder="Keterangan..." />
      </div>
    </div>
    <button class="btn-simpan" onclick="simpanFormKontak('supplier')">Simpan</button>
  </div>
</div>
