<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Sales</span>
  <span id="sales-count" style="font-size:12px;color:rgba(255,255,255,0.8);"></span>
</div>
<div class="crud-search-bar">
  <i class="fa-solid fa-magnifying-glass" style="color:var(--text-light);font-size:14px;flex-shrink:0;"></i>
  <input type="text" id="sales-search" class="crud-search-input" placeholder="Cari sales..." oninput="filterKontak('sales')" />
</div>
<div class="screen-content" id="sales-list"></div>
<button class="crud-fab" onclick="openFormKontak('sales')">
  <i class="fa-solid fa-plus"></i>
</button>

<div id="modal-kontak-sales" class="modal-overlay" style="display:none;" onclick="tutupFormKontak('sales')">
  <div class="modal-sheet crud-form-sheet" onclick="event.stopPropagation()">
    <div class="crud-form-header">
      <span id="form-sales-title">Tambah Sales</span>
      <i class="fa-solid fa-xmark modal-close-icon" onclick="tutupFormKontak('sales')"></i>
    </div>
    <div class="tp-form" style="margin-bottom:12px;">
      <div class="tp-field-group">
        <label class="tp-label">Nama Sales *</label>
        <input type="text" id="form-sales-nama" class="tp-input" placeholder="Nama sales..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">No. Telepon</label>
        <input type="tel" id="form-sales-telp" class="tp-input" placeholder="08xx..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Email</label>
        <input type="email" id="form-sales-email" class="tp-input" placeholder="email@..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Alamat</label>
        <textarea id="form-sales-alamat" class="tp-textarea" rows="2" placeholder="Alamat..."></textarea>
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Target / Keterangan</label>
        <input type="text" id="form-sales-ket" class="tp-input" placeholder="Target penjualan..." />
      </div>
    </div>
    <button class="btn-simpan" onclick="simpanFormKontak('sales')">Simpan</button>
  </div>
</div>
