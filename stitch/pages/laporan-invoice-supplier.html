<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('laporan')"></i>
  <span class="topbar-title">Invoice Supplier</span>
  <i class="fa-solid fa-download topbar-icon" onclick="exportLaporanInvoiceSupplier()"></i>
</div>
<div class="screen-content">
  <div class="laporan-filter-bar">
    <div class="laporan-date-range">
      <div class="form-group">
        <label>Dari</label>
        <input type="date" id="inv-sup-dari" class="form-input" onchange="renderLaporanInvoiceSupplier()" />
      </div>
      <div class="form-group">
        <label>Sampai</label>
        <input type="date" id="inv-sup-sampai" class="form-input" onchange="renderLaporanInvoiceSupplier()" />
      </div>
    </div>
    <div class="form-group" style="flex:1;">
      <label>Cari Supplier</label>
      <input type="text" id="inv-sup-search" class="form-input" placeholder="Nama supplier..." oninput="renderLaporanInvoiceSupplier()" />
    </div>
    <div class="laporan-export-btns">
      <button class="btn-export" onclick="exportInvoiceSupplierPDF()">
        <i class="fa-solid fa-file-pdf"></i> PDF
      </button>
      <button class="btn-export" onclick="exportInvoiceSupplierExcel()">
        <i class="fa-solid fa-file-excel"></i> Excel
      </button>
    </div>
  </div>
  <div id="laporan-invoice-supplier-body"></div>
</div>
