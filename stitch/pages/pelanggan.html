<div class="topbar">
  <i class="fa-solid fa-arrow-left topbar-icon" onclick="switchScreen('pengaturan')" style="font-size:18px;"></i>
  <span class="topbar-title" style="flex:1;text-align:center;">Pelanggan</span>
  <span id="pelanggan-count" style="font-size:12px;color:rgba(255,255,255,0.8);"></span>
</div>
<div class="crud-search-bar">
  <i class="fa-solid fa-magnifying-glass" style="color:var(--text-light);font-size:14px;flex-shrink:0;"></i>
  <input type="text" id="pelanggan-search" class="crud-search-input" placeholder="Cari pelanggan..." oninput="filterKontak('pelanggan')" />
</div>
<div class="screen-content" id="pelanggan-list"></div>
<button class="crud-fab" onclick="openFormKontak('pelanggan')">
  <i class="fa-solid fa-plus"></i>
</button>

<div id="modal-kontak-pelanggan" class="modal-overlay" style="display:none;" onclick="tutupFormKontak('pelanggan')">
  <div class="modal-sheet crud-form-sheet" onclick="event.stopPropagation()">
    <div class="crud-form-header">
      <span id="form-pelanggan-title">Tambah Pelanggan</span>
      <i class="fa-solid fa-xmark modal-close-icon" onclick="tutupFormKontak('pelanggan')"></i>
    </div>
    <div class="tp-form" style="margin-bottom:12px;">
      <div class="tp-field-group">
        <label class="tp-label">Nama Pelanggan *</label>
        <input type="text" id="form-pelanggan-nama" class="tp-input" placeholder="Nama pelanggan..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">No. Telepon</label>
        <input type="tel" id="form-pelanggan-telp" class="tp-input" placeholder="08xx..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Email</label>
        <input type="email" id="form-pelanggan-email" class="tp-input" placeholder="email@..." />
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Alamat</label>
        <textarea id="form-pelanggan-alamat" class="tp-textarea" rows="2" placeholder="Alamat..."></textarea>
      </div>
      <div class="tp-field-group">
        <label class="tp-label">Keterangan</label>
        <input type="text" id="form-pelanggan-ket" class="tp-input" placeholder="Keterangan..." />
      </div>
    </div>
    <button class="btn-simpan" onclick="simpanFormKontak('pelanggan')">Simpan</button>
  </div>
</div>
