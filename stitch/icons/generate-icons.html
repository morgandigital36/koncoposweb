<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#e8637a';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Store icon
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s * 0.55}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('K', s / 2, s / 2);
}
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  drawIcon(c);
  const a = document.createElement('a');
  a.download = 'icon-' + c.width + '.png';
  a.href = c.toDataURL();
  a.textContent = 'Download ' + c.width + 'x' + c.width;
  document.body.appendChild(a);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
